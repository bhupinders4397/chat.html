<!DOCTYPE html>
<html lang="en" x-data="chatApp()" x-init="init()">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal AI Chat</title>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="module">
import { GoogleGenAI } from 'https://esm.sh/@google/genai';
window.GoogleGenAI = GoogleGenAI;
</script>

<style>
[x-cloak] { display:none !important; }
body { background:#131314; }
</style>
</head>

<body class="text-gray-200 overflow-hidden">

<div x-show="isAuthenticated" x-cloak class="flex h-screen">

<!-- BACKDROP -->
<div 
    x-show="sidebarOpen" 
    x-transition.opacity
    @click="sidebarOpen = false"
    class="fixed inset-0 bg-black/50 z-30 lg:hidden">
</div>

<!-- SIDEBAR -->
<aside
    x-show="sidebarOpen || window.innerWidth >= 1024"
    x-transition
    class="fixed lg:static z-40 w-72 h-full bg-[#1e1f20] border-r border-gray-700 flex flex-col"
>
    <div class="p-4 flex flex-col h-full">

        <!-- New Chat -->
        <button @click="createNewChat(); if(window.innerWidth<1024) sidebarOpen=false"
            class="flex items-center gap-3 bg-[#28292a] hover:bg-[#333537] p-3 rounded-full mb-6">
            <i data-lucide="plus"></i>
            <span>New Chat</span>
        </button>

        <!-- History -->
        <div class="flex-1 overflow-y-auto space-y-2">

            <p class="text-xs text-gray-500 px-3">Recent</p>

            <template x-if="history.length===0">
                <p class="text-xs text-gray-500 px-3">No chats yet</p>
            </template>

            <template x-for="chat in history.slice(0,50)" :key="chat.id">
                <div @click="loadChat(chat.id); if(window.innerWidth<1024) sidebarOpen=false"
                    :class="currentChatId===chat.id ? 'bg-[#2d2f31]' : ''"
                    class="flex items-center gap-3 p-3 rounded-full hover:bg-[#2d2f31] cursor-pointer group">

                    <i data-lucide="message-square" class="w-4 h-4"></i>

                    <span class="flex-1 truncate" x-text="chat.title"></span>

                    <button @click.stop="deleteChat(chat.id)"
                        class="opacity-0 group-hover:opacity-100">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            </template>
        </div>

        <!-- Bottom -->
        <div class="pt-3 border-t border-gray-800">

            <button @click="settingsModal=true"
                class="flex items-center gap-3 p-3 hover:bg-[#2d2f31] rounded-full w-full">
                <i data-lucide="settings"></i>
                <span>Settings</span>
            </button>

            <button @click="history=[];localStorage.removeItem('chat_history')"
                class="flex items-center gap-3 p-3 text-red-400 hover:bg-red-500/10 rounded-full w-full">
                <i data-lucide="trash"></i>
                Clear Chats
            </button>

        </div>
    </div>
</aside>

<!-- MAIN -->
<main class="flex-1 flex flex-col">

<header class="p-4 flex justify-between">
<button @click="sidebarOpen=!sidebarOpen">
<i data-lucide="menu"></i>
</button>
<h1>Universal AI</h1>
<div></div>
</header>

<div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">

<template x-for="msg in messages">
<div>
<strong x-text="msg.role"></strong>:
<span x-text="msg.content"></span>
</div>
</template>

</div>

<div class="p-4">
<input x-model="userInput" @keydown.enter="sendMessage()" class="w-full p-3 bg-gray-800 rounded">
</div>

</main>

</div>

<script>
function chatApp(){
return{
isAuthenticated:true,
sidebarOpen:true,
messages:[],
history:[],
currentChatId:null,
userInput:'',
settingsModal:false,
config:{apiKey:'',model:'gemini-flash-latest'},

init(){
this.sidebarOpen = window.innerWidth>=1024;

window.addEventListener('resize',()=>{
if(window.innerWidth>=1024) this.sidebarOpen=true;
});

const h = localStorage.getItem('chat_history');
if(h) this.history = JSON.parse(h);

this.createNewChat();

setTimeout(()=>lucide.createIcons(),100);
},

createNewChat(){
this.currentChatId = Date.now();
this.messages=[];
},

loadChat(id){
const c = this.history.find(x=>x.id===id);
if(c){
this.currentChatId=id;
this.messages=[...c.messages];
}
},

deleteChat(id){
this.history=this.history.filter(x=>x.id!==id);
localStorage.setItem('chat_history',JSON.stringify(this.history));
},

async sendMessage(){
if(!this.userInput.trim()) return;

const text=this.userInput;
this.messages.push({role:'user',content:text});
this.userInput='';

try{
const ai=new window.GoogleGenAI({apiKey:this.config.apiKey});
const res=await ai.models.generateContent({
model:this.config.model,
contents:[{role:'user',parts:[{text}]}]
});
this.messages.push({role:'assistant',content:res.text});
this.syncHistory(text);
}catch(e){
this.messages.push({role:'assistant',content:'Error'});
}

setTimeout(()=>lucide.createIcons(),50);
},

syncHistory(text){
const idx=this.history.findIndex(x=>x.id===this.currentChatId);

if(idx>-1){
this.history[idx].messages=[...this.messages];
}else{
this.history.unshift({
id:this.currentChatId,
title:text.slice(0,20),
messages:[...this.messages]
});
}

localStorage.setItem('chat_history',JSON.stringify(this.history));
}
}
}
</script>

</body>
</html>
