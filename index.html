<!DOCTYPE html>
<html lang="en" x-data="chatApp()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat | Bhupendra Saini</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { GoogleGenAI } from 'https://esm.sh/@google/genai';
        window.GoogleGenAI = GoogleGenAI;
    </script>

    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        
        .sidebar-content { width: 288px; flex-shrink: 0; } /* Forces sidebar to keep its width */
    </style>
</head>
<body class="bg-[#131314] text-gray-200 font-sans antialiased h-screen overflow-hidden">

    <template x-if="!isAuthenticated">
        <div class="fixed inset-0 z-[100] flex items-center justify-center bg-[#0e0e0f]">
            <div class="w-full max-w-md p-8 text-center space-y-6">
                <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-red-500 rounded-3xl mx-auto flex items-center justify-center rotate-12">
                    <i data-lucide="shield-check" class="w-10 h-10 text-white -rotate-12"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Admin Access</h1>
                <input type="password" x-model="loginPass" @keydown.enter="verifyPass()"
                    class="w-full bg-[#1e1f20] border border-gray-700 rounded-xl py-4 px-6 text-center text-xl text-white outline-none"
                    placeholder="Enter Password">
                <button @click="verifyPass()" class="w-full bg-white text-black font-bold py-4 rounded-xl">Unlock System</button>
            </div>
        </div>
    </template>

    <div x-show="isAuthenticated" x-cloak class="flex h-screen w-screen">
        
        <aside :class="sidebarOpen ? 'w-72' : 'w-0'" class="bg-[#1e1f20] transition-all duration-300 flex flex-col border-r border-gray-700 flex-shrink-0 overflow-hidden">
            <div class="sidebar-content p-4 flex flex-col h-full">
                <button @click="createNewChat()" class="flex items-center gap-3 bg-[#28292a] hover:bg-[#333537] p-3 rounded-full mb-8">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    <span class="text-sm font-medium">New Chat</span>
                </button>

                <div class="flex-1 overflow-y-auto space-y-2">
                    <p class="text-xs font-semibold text-gray-500 px-3 uppercase tracking-wider mb-2">History</p>
                    <template x-for="chat in history" :key="chat.id">
                        <div @click="loadChat(chat.id)" class="flex items-center gap-3 p-3 rounded-full cursor-pointer hover:bg-[#2d2f31]">
                            <i data-lucide="message-square" class="w-4 h-4"></i>
                            <span class="text-sm truncate" x-text="chat.title"></span>
                        </div>
                    </template>
                </div>

                <button @click="settingsModal = true" class="mt-auto flex items-center gap-3 p-3 hover:bg-[#2d2f31] rounded-full">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span class="text-sm">Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative overflow-hidden">
            <header class="p-4 flex items-center justify-between">
                <button @click="sidebarOpen = !sidebarOpen" class="p-2 hover:bg-[#2d2f31] rounded-full">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="flex flex-col items-center">
                    <span class="text-lg font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">Universal AI</span>
                </div>
                <div class="w-10"></div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:px-20 space-y-8 pb-32">
                <template x-for="(msg, index) in messages" :key="index">
                    <div class="flex gap-4">
                        <div class="w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-black" :class="msg.role === 'user' ? 'bg-blue-600' : 'bg-indigo-600'">
                            <span x-text="msg.role === 'user' ? 'BS' : 'AI'"></span>
                        </div>
                        <p class="text-gray-200 leading-relaxed text-sm md:text-base" x-text="msg.content"></p>
                    </div>
                </template>
            </div>

            <div class="px-4 pb-4">
                <div class="max-w-3xl mx-auto relative">
                    <textarea x-model="userInput" @keydown.enter.prevent="sendMessage()" class="w-full bg-[#1e1f20] border border-gray-700 text-white rounded-2xl py-4 pl-6 pr-16 outline-none" rows="1" placeholder="Ask anything..."></textarea>
                    <button @click="sendMessage()" class="absolute right-3 top-3 p-2 text-blue-400 hover:bg-[#2d2f31] rounded-full">
                        <i data-lucide="zap" class="w-6 h-6"></i>
                    </button>
                </div>
                <div class="text-center pt-2">
                    <p class="text-[10px] font-bold text-gray-600 uppercase">System Architect Bhupendra Saini © 2026</p>
                </div>
            </div>
        </main>

        <div x-show="settingsModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
            <div @click.away="settingsModal = false" class="bg-[#1e1f20] w-full max-w-sm p-6 rounded-3xl border border-gray-800">
                <h2 class="text-lg font-bold mb-4">Configuration</h2>
                <input type="password" x-model="config.apiKey" class="w-full bg-[#131314] border border-gray-800 rounded-xl p-3 mb-4 text-white" placeholder="API Key">
                <button @click="saveSettings()" class="w-full bg-blue-600 py-3 rounded-xl">Apply Changes</button>
            </div>
        </div>
    </div>

    <script>
        function chatApp() {
            return {
                isAuthenticated: localStorage.getItem('is_auth') === 'true',
                sidebarOpen: true,
                settingsModal: false,
                userInput: '',
                messages: [],
                history: [],
                config: { apiKey: '', model: 'gemini-flash-latest' },
                
                init() {
                    const saved = localStorage.getItem('chat_config');
                    if (saved) this.config = JSON.parse(saved);
                    setTimeout(() => lucide.createIcons(), 100);
                },
                verifyPass() {
                    if (this.loginPass === 'bhupi2026') {
                        this.isAuthenticated = true;
                        localStorage.setItem('is_auth', 'true');
                    }
                },
                async sendMessage() {
                    if (!this.userInput.trim()) return;
                    const text = this.userInput;
                    this.messages.push({ role: 'user', content: text });
                    this.userInput = '';
                    
                    try {
                        const ai = new window.GoogleGenAI({ apiKey: this.config.apiKey });
                        const model = ai.models.generateContent({ model: this.config.model, contents: [{ role: 'user', parts: [{ text }] }] });
                        const res = await model;
                        this.messages.push({ role: 'assistant', content: res.text });
                    } catch (e) {
                        this.messages.push({ role: 'assistant', content: 'Error: ' + e.message });
                    }
                    this.$nextTick(() => lucide.createIcons());
                },
                saveSettings() {
                    localStorage.setItem('chat_config', JSON.stringify(this.config));
                    this.settingsModal = false;
                },
                createNewChat() { this.messages = []; },
                loadChat(id) { /* logic */ }
            }
        }
    </script>
</body>
</html>
