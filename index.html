<!DOCTYPE html>
<html lang="en" x-data="chatApp()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat | Bhupendra Saini</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { GoogleGenAI } from 'https://esm.sh/@google/genai';
        window.GoogleGenAI = GoogleGenAI;
    </script>

    <style>
        [x-cloak] { display: none !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        .glass-effect { background: rgba(30, 31, 32, 0.8); backdrop-filter: blur(12px); }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#131314] text-gray-200 font-sans antialiased overflow-hidden">

<template x-if="!isAuthenticated">
    <div class="fixed inset-0 z-[100] flex items-center justify-center bg-[#0e0e0f]">
        <div class="w-full max-w-md p-8 text-center space-y-6 animate-fade-in">
            <h1 class="text-2xl font-bold text-white">Admin Access</h1>
            <input type="password" x-model="loginPass" @keydown.enter="verifyPass()"
                class="w-full bg-[#1e1f20] border border-gray-700 rounded-xl py-4 px-6 text-center text-white"
                placeholder="••••••••">
            <button @click="verifyPass()" class="w-full bg-white text-black font-bold py-4 rounded-xl">
                Unlock System
            </button>
            <p x-show="loginError" x-cloak class="text-red-400 text-sm">Incorrect Password</p>
        </div>
    </div>
</template>

<div x-show="isAuthenticated" x-cloak class="flex h-screen overflow-hidden">
    
    <!-- SIDEBAR -->
    <aside :class="sidebarOpen ? 'w-72' : 'w-0'" class="bg-[#1e1f20] transition-all duration-300 flex flex-col border-r border-gray-700 flex-shrink-0 h-screen overflow-y-auto">
        <div class="p-4 flex flex-col min-h-screen w-72">
            
            <!-- New Chat -->
            <button @click="createNewChat()" class="flex items-center gap-3 bg-[#28292a] p-3 rounded-full mb-4">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span class="text-sm">New Chat</span>
            </button>

            <!-- SETTINGS (MOVED HERE) -->
            <button @click="settingsModal = true" class="flex items-center gap-3 p-3 hover:bg-[#2d2f31] rounded-full mb-6">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-sm">Settings</span>
            </button>

            <!-- HISTORY -->
            <div class="flex-1 overflow-y-auto space-y-2">
                <p class="text-xs text-gray-500 px-3 mb-2">Recent History</p>
                <template x-for="chat in history" :key="chat.id">
                    <div @click="loadChat(chat.id)" class="p-3 rounded-full hover:bg-[#2d2f31] cursor-pointer">
                        <span x-text="chat.title"></span>
                    </div>
                </template>
            </div>

        </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-[#131314]">
        
        <header class="p-4 flex justify-between">
            <button @click="sidebarOpen = !sidebarOpen">
                ☰
            </button>
            <span>Universal AI</span>
            <div></div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
            <template x-for="msg in messages">
                <p x-text="msg.content"></p>
            </template>
        </div>

        <div class="p-4">
            <textarea x-model="userInput" @keydown.enter.prevent="sendMessage()"
                class="w-full bg-[#1e1f20] text-white p-3 rounded"></textarea>
        </div>

    </main>
</div>

<script>
function chatApp() {
    return {
        isAuthenticated: false,
        loginPass: '',
        loginError: false,
        sidebarOpen: true,
        settingsModal: false,
        userInput: '',
        messages: [],
        history: [],
        currentChatId: null,

        init() {
            this.isAuthenticated = true;
        },

        verifyPass() {
            if (this.loginPass === 'bhupi2026') {
                this.isAuthenticated = true;
            } else {
                this.loginError = true;
            }
        },

        createNewChat() {
            this.messages = [];
        },

        loadChat(id) {},

        async sendMessage() {
            this.messages.push({ content: this.userInput });
            this.userInput = '';
        }
    }
}
</script>

</body>
</html>
