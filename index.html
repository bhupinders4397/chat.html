<!DOCTYPE html>
<html lang="en" x-data="chatApp()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat | Bhupendra Saini</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { GoogleGenAI } from 'https://esm.sh/@google/genai';
        window.GoogleGenAI = GoogleGenAI;
    </script>

    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .glass-effect { background: rgba(30,31,32,0.8); backdrop-filter: blur(12px); }
    </style>
</head>

<body class="bg-[#131314] text-gray-200 overflow-hidden">

<div x-show="isAuthenticated" x-cloak class="flex h-screen overflow-hidden">
        
<!-- ✅ FIXED SIDEBAR -->
<aside :class="sidebarOpen ? 'w-72' : 'w-0'" 
class="bg-[#1e1f20] transition-all duration-300 flex flex-col border-r border-gray-700 overflow-y-auto flex-shrink-0">

<div class="p-4 flex flex-col h-full w-72">

<button @click="createNewChat()" class="flex items-center gap-3 bg-[#28292a] hover:bg-[#333537] p-3 rounded-full mb-8">
<i data-lucide="plus"></i>
<span>New Chat</span>
</button>

<!-- ✅ IMPORTANT FIX -->
<div class="flex-1 min-h-0 overflow-y-auto space-y-2">
<template x-for="chat in history" :key="chat.id">
<div @click="loadChat(chat.id)" class="p-3 hover:bg-[#2d2f31] rounded-full cursor-pointer">
<span x-text="chat.title"></span>
</div>
</template>
</div>

<!-- ✅ SETTINGS ALWAYS VISIBLE -->
<div class="pt-2 border-t border-gray-800">
<button @click="settingsModal = true" class="w-full flex items-center gap-3 p-3 hover:bg-[#2d2f31] rounded-full">
<i data-lucide="settings"></i>
<span>Settings</span>
</button>
</div>

</div>
</aside>

<!-- MAIN -->
<main class="flex-1 flex flex-col relative overflow-hidden">

<header class="p-4 flex justify-between">
<button @click="sidebarOpen = !sidebarOpen"><i data-lucide="menu"></i></button>
<div>Universal AI</div>
<div></div>
</header>

<div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-40">
<template x-for="msg in messages">
<div><span x-text="msg.content"></span></div>
</template>
</div>

<!-- INPUT -->
<div class="absolute bottom-0 left-0 right-0 px-4 pb-4 pt-10 bg-gradient-to-t from-[#131314] via-[#131314] to-transparent">
<textarea x-model="userInput" class="w-full bg-[#1e1f20] p-3 rounded"></textarea>
<button @click="sendMessage()">Send</button>
</div>

<!-- ✅ FIXED FOOTER (ALWAYS VISIBLE) -->
<footer class="absolute bottom-2 left-0 right-0 text-center pointer-events-none z-20">
<p class="text-[10px] font-bold tracking-[0.2em] text-gray-400 uppercase">
System Architect <span class="text-blue-400 font-semibold">Bhupendra Saini</span> © 2026
</p>
</footer>

</main>
</div>

<script>
function chatApp(){
return{
isAuthenticated:true,
sidebarOpen:window.innerWidth>1024,
settingsModal:false,
messages:[],
userInput:'',
history:[],

createNewChat(){this.messages=[]},

sendMessage(){
if(!this.userInput.trim()) return;
this.messages.push({content:this.userInput});
this.userInput='';
}
}
}
</script>

<script>lucide.createIcons();</script>

</body>
</html>
